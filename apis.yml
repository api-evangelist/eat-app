aid: eat-app
url: https://raw.githubusercontent.com/api-evangelist/eat-app/refs/heads/main/apis.yml
name: Eat App
kind: company
description: Eat App is a restaurant reservation and table management platform used by
  restaurants and restaurant groups to take bookings, manage floor plans and tables,
  build guest CRM profiles, and run front-of-house operations. Its developer surface
  is a partner/key-gated REST platform - a Partner API for booking channels to read
  availability and post reservations, and a Concierge API for restaurants, vendors,
  and groups to sync reservations, guests, availability, restaurants, and groups.
  Both use JSON:API-style responses, Bearer-token authentication, and an
  api.eat-sandbox.co sandbox mirroring api.eatapp.co production. Eat App also exposes
  a Restaurant MCP server for connecting AI assistants. API access is granted on
  request rather than fully self-serve.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Restaurant
- Reservations
- Table Management
- Hospitality
- Bookings
- Guest CRM
- Availability
