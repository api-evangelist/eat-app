description: >-
  FinOps view of Eat App spend. Eat App is per-location SaaS billed monthly (or
  annually at a discount) on a plan tier - Free, Starter, Essential, or Pro -
  per restaurant location. Cost scales primarily with the number of locations
  and the plan tier chosen, plus paid integration add-ons (POS, phone, payment,
  hotel PMS) that are also per location. API access (Partner API, Concierge API)
  is not separately metered - it is granted as part of a plan / partner
  onboarding - so there is no per-call API charge to track; the dominant cost
  driver is location count times plan tier.
notes: >-
  Per-location plan prices and add-on fees are grounded in the Eat App pricing
  page as of the review date and are not otherwise reconciled. There is no
  published usage-metered API billing; verify with Eat App whether high-volume
  API/partner use carries any additional contract terms.
