meters:
- name: location_subscription
  description: Monthly per-location subscription charge for the chosen plan tier.
  unit: locations
  aggregation: sum
  dimensions:
  - account
  - location
  - plan
- name: integration_addons
  description: Per-location add-on charges for POS, phone, payment, and hotel PMS integrations.
  unit: locations
  aggregation: sum
  dimensions:
  - account
  - location
  - integration
- name: covers
  description: Monthly covers (seated guests); bounded by plan tier rather than billed per cover.
  unit: covers
  aggregation: sum
  dimensions:
  - account
  - location
principles:
- name: Visibility
  description: Track subscription and add-on charges per location and plan tier; API access does not add a per-call meter.
- name: Allocation
  description: Map each location's plan and add-ons to the owning brand / cost center; multi-location groups aggregate at the group level.
- name: Optimization
  description: Right-size plan tiers per location against actual cover volume; drop unused integration add-ons; consolidate under group billing where available.
- name: Accountability
  description: Assign an owner per location subscription and review monthly against cover usage and integration needs.
